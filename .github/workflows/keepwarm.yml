name: Keep Render warm (A)

# Render's free tier puts the service to sleep after ~15 min of no
# traffic; first request after sleep takes 30–60 s (cold start).
# This workflow pings /healthz every 5 min (GitHub Actions hard min)
# during active hours so Render's 15-min sleep timer never elapses.
#
# Cron is UTC. 7am–11pm Pacific = 14:00–06:00 UTC (spans midnight).
# Pair this with keepwarm-b.yml — offset by 2 min — so if GH Actions
# delays one of them (which happens often on busy days), the other
# still has a chance of landing inside Render's sleep window. With
# both running, p50 gap should stay under 10 min in practice.

on:
  schedule:
    # Every 5 minutes, on :00 :05 :10 … :55 minutes.
    - cron: "*/5 14-23,0-6 * * *"
  workflow_dispatch:

concurrency:
  group: keepwarm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /healthz
        run: |
          # --max-time 90 s gives Render headroom to wake if this ping
          # is the one that happened to find it asleep (the goal is
          # that the NEXT real user request finds it warm).
          code=$(curl -sS -o /dev/null --max-time 90 \
            -w "%{http_code}" https://sneha-os.onrender.com/healthz)
          echo "healthz returned $code"
          [ "$code" = "200" ] || exit 1
