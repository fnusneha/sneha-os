name: Keep Render warm (B)

# Redundant second keep-warm workflow offset by ~2 min from the main
# one. Two workflows with different schedules dramatically reduce the
# chance of a long gap caused by GitHub Actions cron delays — if A
# gets queued late, B usually still fires close to its slot, and
# vice versa. Each ping is <10 s so this stays well under the free
# Actions minute budget even doubled.

on:
  schedule:
    # Every 5 minutes, offset by 2 (so :02 :07 :12 … :57).
    - cron: "2-57/5 14-23,0-6 * * *"
  workflow_dispatch:

concurrency:
  group: keepwarm-b
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /healthz
        run: |
          code=$(curl -sS -o /dev/null --max-time 90 \
            -w "%{http_code}" https://sneha-os.onrender.com/healthz)
          echo "healthz returned $code"
          [ "$code" = "200" ] || exit 1
