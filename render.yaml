# Render blueprint for Sneha.OS. On connect, Render reads this file
# and provisions the services. Push-to-main auto-deploys.
#
# Docs: https://render.com/docs/yaml-spec
services:
  - type: web
    name: sneha-os
    runtime: python
    plan: free                 # sleeps after 15 min idle; 30-60s cold start
    region: oregon             # match Neon region (us-west-2)
    branch: main
    autoDeploy: true
    healthCheckPath: /healthz
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT --access-logfile - --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      # Make rides_report pull from Neon instead of a non-existent cache file.
      - key: USE_DB_RIDES
        value: "1"
      # Disable interactive Google OAuth — fail loud instead of hanging.
      - key: GOOGLE_NO_INTERACTIVE
        value: "1"

      # --- Secrets (set manually in Render dashboard; sync: false keeps
      # them out of render.yaml / git forever) ---
      - key: DATABASE_URL
        sync: false
      - key: OURA_TOKEN
        sync: false
      - key: GARMIN_EMAIL
        sync: false
      - key: GARMIN_PASSWORD
        sync: false
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_REFRESH_TOKEN
        sync: false
      # Google user OAuth token JSON (produced by token.json; paste the
      # entire file contents as one env var).
      - key: GOOGLE_TOKEN_JSON
        sync: false
